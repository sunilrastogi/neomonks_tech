<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — NeoMonks</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#0d0f18;--surface:#141622;--border:#252840;--accent:#6366f1;
      --text:#e2e8f0;--muted:#64748b;--ok:#22c55e;--err:#ef4444}
    body{background:var(--bg);color:var(--text);font-family:'Inter',system-ui,sans-serif;
      height:100vh;display:flex;align-items:center;justify-content:center}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;
      padding:32px;width:100%;max-width:360px}
    .logo{font-weight:800;font-size:20px;color:var(--accent);text-align:center}
    .tag{font-size:12px;color:var(--muted);text-align:center;margin:4px 0 22px}
    label{font-size:11px;color:var(--muted);display:block;margin:0 0 5px}
    input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);
      border-radius:8px;padding:10px 12px;font-size:14px;outline:none;margin-bottom:14px}
    input:focus{border-color:var(--accent)}
    button{width:100%;background:var(--accent);color:#fff;border:none;border-radius:8px;
      padding:11px;font-size:14px;font-weight:600;cursor:pointer}
    #msg{font-size:12px;margin-top:14px;text-align:center}
  </style>
</head>
<body>
  <form class="card" id="form">
    <div class="logo">NeoMonks</div>
    <div class="tag">Choose a new password</div>
    <label for="pw">New password</label>
    <input id="pw" type="password" autocomplete="new-password" minlength="8" required />
    <button type="submit">Update password</button>
    <div id="msg"></div>
  </form>
  <script>
    const params = new URLSearchParams(location.search);
    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const msg = document.getElementById('msg');
      const r = await fetch('/api/v1/auth/password-reset/confirm/', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          uid: params.get('uid'),
          token: params.get('token'),
          new_password: document.getElementById('pw').value,
        }),
      });
      const data = await r.json().catch(() => ({}));
      msg.style.color = r.ok ? 'var(--ok)' : 'var(--err)';
      msg.textContent = data.detail || (r.ok ? 'Done.' : 'Failed.');
      if (r.ok) setTimeout(() => location.href = '/login/', 1500);
    });
  </script>
</body>
</html>
